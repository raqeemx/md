<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرر ماركداون | Markdown Editor</title>
    <meta name="description" content="محرر ملفات Markdown مع معاينة مباشرة ودعم كامل للعربية والإنجليزية">

    <!-- Google Fonts: Arabic + Latin + Monospace -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">

    <!-- highlight.js themes (light/dark) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" id="hljs-theme-light">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" id="hljs-theme-dark" disabled>

    <!-- App styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ===== Header / Toolbar ===== -->
    <header id="app-header" class="app-header">
        <div class="header-brand">
            <i class="fa-brands fa-markdown brand-icon" aria-hidden="true"></i>
            <h1 class="brand-title" data-i18n="appTitle">محرر ماركداون</h1>
        </div>

        <nav class="toolbar" aria-label="أدوات التحرير">
            <!-- File actions -->
            <div class="toolbar-group">
                <button id="btn-open" class="btn btn-primary" data-i18n-title="openFile" title="فتح ملف">
                    <i class="fa-solid fa-folder-open" aria-hidden="true"></i>
                    <span class="btn-label" data-i18n="open">فتح</span>
                </button>
                <button id="btn-save" class="btn btn-success" data-i18n-title="saveFile" title="حفظ / تحميل الملف">
                    <i class="fa-solid fa-download" aria-hidden="true"></i>
                    <span class="btn-label" data-i18n="save">حفظ</span>
                </button>
                <button id="btn-clear" class="btn btn-danger" data-i18n-title="clearContent" title="تفريغ المحتوى">
                    <i class="fa-solid fa-trash-can" aria-hidden="true"></i>
                    <span class="btn-label" data-i18n="clear">تفريغ</span>
                </button>
            </div>

            <!-- View mode -->
            <div class="toolbar-group view-switcher" role="group" aria-label="وضع العرض">
                <button id="btn-view-editor" class="btn btn-ghost view-btn" data-view="editor" data-i18n-title="editorOnly" title="المحرر فقط">
                    <i class="fa-solid fa-pen" aria-hidden="true"></i>
                </button>
                <button id="btn-view-split" class="btn btn-ghost view-btn active" data-view="split" data-i18n-title="splitView" title="عرض مقسوم">
                    <i class="fa-solid fa-table-columns" aria-hidden="true"></i>
                </button>
                <button id="btn-view-preview" class="btn btn-ghost view-btn" data-view="preview" data-i18n-title="previewOnly" title="المعاينة فقط">
                    <i class="fa-solid fa-eye" aria-hidden="true"></i>
                </button>
            </div>

            <!-- Settings -->
            <div class="toolbar-group">
                <button id="btn-direction" class="btn btn-ghost" data-i18n-title="toggleDirection" title="تبديل اتجاه النص">
                    <i class="fa-solid fa-right-left" aria-hidden="true"></i>
                    <span class="btn-label" id="dir-label">RTL</span>
                </button>
                <button id="btn-lang" class="btn btn-ghost" data-i18n-title="toggleLang" title="تبديل لغة الواجهة">
                    <i class="fa-solid fa-language" aria-hidden="true"></i>
                    <span class="btn-label" id="lang-label">EN</span>
                </button>
                <button id="btn-theme" class="btn btn-ghost" data-i18n-title="toggleTheme" title="الوضع الليلي / النهاري">
                    <i class="fa-solid fa-moon" id="theme-icon" aria-hidden="true"></i>
                </button>
            </div>
        </nav>
    </header>

    <!-- Hidden file input -->
    <input type="file" id="file-input" accept=".md,.markdown,.txt" hidden>

    <!-- ===== Main workspace ===== -->
    <main id="workspace" class="workspace view-split">

        <!-- Editor pane -->
        <section id="editor-pane" class="pane editor-pane" aria-label="محرر النص">
            <div class="pane-header">
                <span class="pane-title">
                    <i class="fa-solid fa-code" aria-hidden="true"></i>
                    <span data-i18n="editor">المحرر</span>
                </span>
                <span id="file-name" class="file-name" data-i18n-placeholder="untitled">untitled.md</span>
            </div>
            <textarea id="editor" class="editor" spellcheck="false"
                      data-i18n-ph="editorPlaceholder"
                      placeholder="اكتب نص Markdown هنا… أو افتح ملفاً من جهازك"></textarea>
        </section>

        <!-- Divider (visual only) -->
        <div class="pane-divider" aria-hidden="true"></div>

        <!-- Preview pane -->
        <section id="preview-pane" class="pane preview-pane" aria-label="المعاينة المباشرة">
            <div class="pane-header">
                <span class="pane-title">
                    <i class="fa-solid fa-eye" aria-hidden="true"></i>
                    <span data-i18n="preview">المعاينة</span>
                </span>
            </div>
            <div class="reader-layout">
                <aside id="preview-toc" class="preview-toc" aria-label="فهرس الملف">
                    <div class="toc-title" data-i18n="tocTitle">فهرس الملف</div>
                    <div id="toc-links" class="toc-links"></div>
                </aside>

                <div id="reader-scroll" class="reader-scroll">
                    <section id="preview-cover" class="preview-cover">
                        <span class="preview-eyebrow">
                            <span class="pulse-dot" aria-hidden="true"></span>
                            <span data-i18n="previewBadge">وضع قراءة احترافي</span>
                        </span>
                        <h2 id="preview-title">محرر ماركداون</h2>
                        <p id="preview-summary" data-i18n="previewSummaryEmpty">افتح ملف Markdown أو ابدأ الكتابة لعرضه بتنسيق احترافي.</p>
                        <div class="preview-chips" aria-label="معلومات الملف">
                            <span class="preview-chip"><i class="fa-solid fa-file-lines" aria-hidden="true"></i><span id="preview-file-chip">untitled.md</span></span>
                            <span class="preview-chip"><i class="fa-solid fa-list-ul" aria-hidden="true"></i><span id="preview-section-chip">0 أقسام</span></span>
                            <span class="preview-chip"><i class="fa-solid fa-align-left" aria-hidden="true"></i><span id="preview-direction-chip">RTL</span></span>
                        </div>
                    </section>

                    <article id="preview" class="preview markdown-body"></article>
                </div>
            </div>
        </section>
    </main>

    <!-- ===== Status bar ===== -->
    <footer id="status-bar" class="status-bar">
        <span id="stat-words"><i class="fa-solid fa-font" aria-hidden="true"></i> <span data-i18n="words">كلمات</span>: <b id="word-count">0</b></span>
        <span id="stat-chars"><i class="fa-solid fa-keyboard" aria-hidden="true"></i> <span data-i18n="chars">أحرف</span>: <b id="char-count">0</b></span>
        <span id="stat-lines"><i class="fa-solid fa-bars" aria-hidden="true"></i> <span data-i18n="lines">أسطر</span>: <b id="line-count">0</b></span>
        <span id="save-status" class="save-status"></span>
    </footer>

    <!-- Drag & drop overlay -->
    <div id="drop-overlay" class="drop-overlay" hidden>
        <div class="drop-message">
            <i class="fa-solid fa-file-arrow-down" aria-hidden="true"></i>
            <p data-i18n="dropHere">أفلت ملف Markdown هنا</p>
        </div>
    </div>

    <!-- Toast notifications -->
    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.5/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.9.0/highlight.min.js"></script>

    <!-- App logic -->
    <script src="js/main.js"></script>
</body>
</html>
